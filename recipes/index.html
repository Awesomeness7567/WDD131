<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecipeBook</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="index.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@700&display=swap"rel="stylesheet">
    
    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="RecipeBook">
    <meta property="og:description" content="RecipeBook is a collection of delicious recipes for every occasion. Find your next favorite dish here!">
    <meta property="og:url" content="https://awesomeness7567.github.io/WDD131/recipes/index.html">
    <meta property="og:image" content="social-preview-image.png">

    <!-- Twitter/X Card -->
    <meta name="twitter:card" content="Social Preview Image">
    <meta name="twitter:title"content="Recipe Book">
    <meta name="twitter:description"content="Discover delicious homemade recipes and desserts.">
    <meta name="twitter:image"content="images/social-preview-image.png">

    <!-- Favicon -->
    <link rel="icon"href="favicon.ico">

    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon"href="images/apple-touch-icon.png">

</head>
<body>

    <div class="container">
        <header class="header">
            <div class="logo-container">
                <img src="recipe-book.png" alt="RecipeBook" class="logo-icon">
                <h1 class="logo-text">RECIPEBOOK</h1>
            </div>
        </header>

        <div class="search-section">
            <div class="search-bar">
                <input type="text" placeholder="Find a recipe">
                <button aria-label="Search"><img src="search.svg" alt="Search-icon"></button>
            </div>
        </div>

        <hr>

        <main class="recipe-card">
            <div class="recipe-image-wrapper">
                <img src="apple-crisp.jpg" alt="Apple Crisp with Ice Cream" class="recipe-image">
            </div>
            
            <div class="recipe-details">
                <span class="tag">dessert</span>
                <h2 class="recipe-title">APPLE CRISP</h2>
                
            <span
            class="rating"
            role="img"
            aria-label="Rating: 4 out of 5 stars"
            >
            <span aria-hidden="true" class="icon-star">⭐</span>
            <span aria-hidden="true" class="icon-star">⭐</span>
            <span aria-hidden="true" class="icon-star">⭐</span>
            <span aria-hidden="true" class="icon-star">⭐</span>
            <span aria-hidden="true" class="icon-star-empty">☆</span>
            </span>
                            
                <p class="recipe-description">
                    This apple crisp recipe is a simple yet delicious fall dessert that's great served warm with vanilla ice cream.
                </p>
            </div>
        </main>

        <footer class="footer">
            <div class="social-icons">
                <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates  -->
                <a href="https://www.instagram.com/"target="_blank"><img src="instagram_icon.svg"alt="instagram icon"></a>
                <a href="https://www.youtube.com/"target="_blank"><img src="youtube_icon.svg"alt="youtube icon"></a>
                <a href="https://www.pinterest.com/"target="_blank"><img src="pinterest_icon.svg"alt="pinterest icon"></a>
            </div>

            <div class="attribution">
                <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">Recipe icons created by Freepik - Flaticon</a>                   
            </div>                  
        </footer>
    </div>

</body>
</html>
