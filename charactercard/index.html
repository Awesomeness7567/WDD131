<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Card</title>
    <link rel="stylesheet" href="index.css" defer>
    <script src="index.js" defer></script>
    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Put Page Title Here">
    <meta property="og:description" content="Put Page Description Here">
    <meta property="og:url" content="https://yourURLofPage.here">
    <meta property="og:image" content="https://yourURLofSocialPreviewImageHere.png">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Put Page Title Here">
    <meta name="twitter:description" content="Put Page Description Here">
    <meta name="twitter:image" content="https://yourURLofSocialPreviewImageHere.png">

    <!-- One favicon (ICO works everywhere) -->
    <link rel="icon" href="/favicon.ico">

    <!-- One Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="/images/apple-touch-icon.png">
</head>
<body>

    <div id="death-banner">
      ☠ Snortleblat has died!
    </div>
    <main class="card">
        <img
            id="character-image"
            src="img.webp"
            alt="Swamp Beast Diplomat"
            fetchpriority="high"
            width="370"
            height="440"
        >
        <div class="title-section">
            <h1 id="name">Snortleblat</h1>
        </div>

        <div class="info">
            <p>
                <span class="label">Class:</span>
                <span id="class">Swamp Beast Diplomat</span>
            </p>
            <p>
                <span class="label">Level:</span>
                <span id="level">8</span>
            </p>
            <p>
                <span class="label">Health:</span>
                <span id="health">20</span>
            </p>
        </div>

        <div class="buttons">
            <button id="attack-btn">
                Attacked
            </button>
            <button id="levelup-btn">
                Level Up
            </button>
        </div>
        <p id="message"></p>
    </main>
</body>
</html>
